<!DOCTYPE html>
<html>
<head>
    <title>Barbershop Chord Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 40px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 800px; position: relative; }
        #notation-container { background: #fff; border: 1px solid #e1e4e8; margin-bottom: 20px; border-radius: 8px; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 10px; }
        .part-ctrl { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #eee; cursor: pointer; transition: all 0.1s; }
        .part-ctrl.active { border-color: #007bff; background: #e7f3ff; }
        
        .note-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; }
        input.note-input { width: 80px; font-size: 1.1rem; text-align: center; padding: 6px; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; outline: none; }
        input.tuning-input { 
            width: 42px; font-size: 0.75rem; color: #333; background: #fff; padding: 6px 2px; border-radius: 6px; 
            min-height: 1.1rem; font-family: monospace; border: 1px solid #ccc; text-align: center;
        }

        .btn-group { display: flex; justify-content: center; gap: 4px; }
        button { cursor: pointer; border: 1px solid #ccc; background: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        #analysis-result { border-top: 2px solid #f0f0f0; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; min-height: 80px; transition: opacity 0.2s; }
        #analysis-result.pending { opacity: 0.4; }
        .pending-text { font-size: 0.8rem; font-weight: normal; color: #999; margin-left: 10px; }
        .manifest { position: absolute; top: 10px; right: 15px; font-size: 0.65rem; color: #bbb; font-family: monospace; text-align: right; line-height: 1.4; }
        .manifest a { color: #007bff; text-decoration: none; font-weight: bold; }
        
        .play-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; cursor: pointer; }
        .play-btn:hover { background: #218838; }
        .save-btn { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; cursor: pointer; }
        .analyze-btn { background: #17a2b8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; cursor: pointer; }
        .analyze-btn:disabled { opacity: 0.6; cursor: wait; }

        .settings-grid { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 15px; margin-bottom: 10px; padding: 0 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: #555; }
        
        .vowel-selector, .intonation-selector { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .selector-opt { cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 0.85rem; background: #eee; padding: 3px 6px; border-radius: 4px; }
        .selector-opt input { margin: 0; }
        .section-label { font-size: 0.85rem; color: #555; font-weight: bold; width: 100%; margin-bottom: 2px; }

        .adv-panel { margin-top: 15px; margin-bottom: 25px; border: 1px solid #eee; border-radius: 8px; padding: 12px; background: #fafafa; }
        .adv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; font-size: 0.75rem; }
        .adv-grid label { font-weight: bold; color: #666; }
        .val-disp { text-align: right; color: #007bff; font-family: monospace; margin-top: 2px; }
    </style>
</head>
<body>
<div class="card">
    <div id="manifest" class="manifest"></div>
    <h1 style="margin-top:0; font-size: 1.1rem; color: #666;">Barbershop Chord Calculator</h1>
    <div id="notation-container"><div id="notation"></div></div>
    <div class="controls"></div>
    
    <div class="settings-grid">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label class="checkbox-label"><input type="checkbox" id="rootlessToggle"> Analyze rootless 9ths</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <label class="checkbox-label" style="font-size: 0.75rem;">Voices per part: <input type="number" id="vpsCount" value="4" min="1" max="20" style="width: 35px;"></label>
                <label class="checkbox-label" style="font-size: 0.75rem;">Duration (s): <input type="number" id="duration" value="5" min="1" max="15" style="width: 35px;"></label>
            </div>
            <label class="checkbox-label" style="font-size: 0.75rem;">Vol: <input type="range" id="volume" min="0.01" max="0.2" step="0.01" value="0.05" style="width: 80px;"></label>
            
            <div class="intonation-selector">
                <span class="section-label">Intonation:</span>
                <label class="selector-opt"><input type="radio" name="intonation" value="equal"> Equal</label>
                <label class="selector-opt"><input type="radio" name="intonation" value="just" checked> Just</label>
                <label class="selector-opt"><input type="radio" name="intonation" value="pythagorean"> Pyth.</label>
                <label class="selector-opt"><input type="radio" name="intonation" value="custom"> Custom</label>
            </div>
        </div>
        <div class="vowel-selector">
            <span class="section-label">Vowel:</span>
            <label class="selector-opt"><input type="radio" name="vowel" value="i"> [i]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="y"> [y]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɪ"> [ɪ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="e"> [e]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɛ"> [ɛ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="æ"> [æ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="a" checked> [a]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ə"> [ə]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ʌ"> [ʌ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɑ"> [ɑ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɒ"> [ɒ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɔ"> [ɔ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="o"> [o]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ʊ"> [ʊ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="u"> [u]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɚ"> [ɚ]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɑ˞"> [ɑ˞]</label>
            <label class="selector-opt"><input type="radio" name="vowel" value="ɔ˞"> [ɔ˞]</label>
            <label class="selector-opt" style="background: #ffd"><input type="radio" name="vowel" value="custom"> Custom</label>
        </div>
    </div>

    <details id="advDetails" class="adv-panel">
        <summary style="font-size: 0.8rem; font-weight: bold; color: #888; cursor: pointer; outline: none;">Advanced Audio Settings</summary>
        <div class="adv-grid">
            <div style="grid-column: span 3; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-bottom: 5px; color: #444; font-weight: bold;">Vocal Tract (Formants)</div>
            <div>
                <label>F1 (Height):<br><input type="range" id="f1" min="200" max="1000" value="730" style="width:100%"></label>
                <div id="v_f1" class="val-disp">730Hz</div>
            </div>
            <div>
                <label>F2 (Place):<br><input type="range" id="f2" min="500" max="3000" value="1090" style="width:100%"></label>
                <div id="v_f2" class="val-disp">1090Hz</div>
            </div>
            <div>
                <label>F3 (Color/Rhotic):<br><input type="range" id="f3" min="1000" max="4000" value="2440" style="width:100%"></label>
                <div id="v_f3" class="val-disp">2440Hz</div>
            </div>

            <div style="grid-column: span 3; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 10px; color: #444; font-weight: bold;">Synthesis Engine</div>
            <div>
                <label>Vibrato Jitter Cutoff:<br><input type="range" id="vibratoJitterCutoff" min="10" max="1000" value="100" style="width:100%"></label>
                <div id="v_vibratoJitterCutoff" class="val-disp">100Hz</div>
            </div>
            <div>
                <label>Vibrato Jitter Amount:<br><input type="range" id="vibratoJitterAmount" min="0" max="150" step="1" value="2.5" style="width:100%"></label>
                <div id="v_vibratoJitterAmount" class="val-disp">2.5</div>
            </div>
            <div>
                <label>Phase Jitter:<br><input type="range" id="phaseJitter" min="0" max="0.5" step="0.01" value="0.08" style="width:100%"></label>
                <div id="v_phaseJitter" class="val-disp">0.08s</div>
            </div>
            <div>
                <label>Vibrato Depth:<br><input type="range" id="vibratoDepth" min="0" max="0.03" step="0.001" value="0.006" style="width:100%"></label>
                <div id="v_vibratoDepth" class="val-disp">0.006</div>
            </div>
            <div>
                <label>Vibrato Rate Mean:<br><input type="range" id="vibratoRateMean" min="0" max="10" step="0.1" value="5.2" style="width:100%"></label>
                <div id="v_vibratoRateMean" class="val-disp">5.2Hz</div>
            </div>
            <div>
                <label>Vibrato Rate Range:<br><input type="range" id="vibratoRateRange" min="0" max="5" step="0.1" value="1.2" style="width:100%"></label>
                <div id="v_vibratoRateRange" class="val-disp">1.2Hz</div>
            </div>
            <div>
                <label>Formant Q1:<br><input type="range" id="formantQ1" min="1" max="50" step="1" value="10" style="width:100%"></label>
                <div id="v_formantQ1" class="val-disp">10</div>
            </div>
            <div>
                <label>Formant Q2+:<br><input type="range" id="formantQ2" min="1" max="50" step="1" value="15" style="width:100%"></label>
                <div id="v_formantQ2" class="val-disp">15</div>
            </div>
        </div>
    </details>

    <div id="analysis-result">
        <div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <h2 id="chordName" style="margin:0;">Analyzing...</h2>
                <button id="playBtn" class="play-btn"><span>▶</span> Play</button>
                <button id="saveBtn" class="save-btn"><span>💾</span> Save .wav</button>
                <button id="analyzeBtn" class="analyze-btn"><span>📊</span> Analyze</button>
            </div>
            <span id="pendingIndicator" class="pending-text" style="display:none;">(calculating...)</span>
            <p id="meta" style="color: #007bff; font-weight: 600; margin: 5px 0; min-height: 1.2em;"></p>
        </div>
        <div id="roles" style="text-align: right; color: #444; line-height: 1.5;"></div>
    </div>
</div>

<script type="module">
import { getAbsSemitone, getVariations, STR_TO_ACC, ACC_TO_STR, STEP_TO_SEMI, SERIAL as S_SPEL } from '/static/js/spelling.js';
import { renderControls, handleGlobalKey, SERIAL as S_UI } from '/static/js/ui-controls.js';
import { drawChord, SERIAL as S_NOT } from '/static/js/notation.js';
import { playChord, saveChordAsWav, analyzeAndShow, SERIAL as S_AUD } from '/static/js/audio.js';

const SHOW_SERIALS = false;
const S_IDX = "#053";

const manifestEl = document.getElementById('manifest');
const docsLink = "<a href='/help' target='_blank'>Documentation</a>";
if (SHOW_SERIALS) {
    manifestEl.innerHTML = "index: " + S_IDX + " | " + docsLink + "<br>spel: " + S_SPEL + "<br>ui: #023<br>not: " + S_NOT + "<br>aud: " + S_AUD + "<br>test: #042";
} else {
    manifestEl.innerHTML = docsLink;
}

const VOWEL_PRESETS = {
    'i': [270, 2290, 3010], 'y': [270, 1800, 2300], 'ɪ': [390, 1990, 2550],
    'e': [390, 2300, 2850], 'ɛ': [530, 1840, 2480], 'æ': [660, 1720, 2410],
    'a': [730, 1090, 2440], 'ə': [500, 1500, 2500], 'ʌ': [640, 1190, 2390],
    'ɑ': [700, 1100, 2400], 'ɒ': [600, 900, 2400], 'ɔ': [570, 840, 2410],
    'o': [460, 1100, 2490], 'ʊ': [440, 1020, 2240], 'u': [300, 870, 2240],
    'ɚ': [500, 1400, 1600], 'ɑ˞': [700, 1100, 1600], 'ɔ˞': [570, 840, 1600]
};

let chordState = [
    { part: 'Bass', step: 'g', acc: 0, oct: 3 },
    { part: 'Bari', step: 'b', acc: 0, oct: 3 },
    { part: 'Lead', step: 'd', acc: 0, oct: 4 },
    { part: 'Tenor', step: 'f', acc: 0, oct: 4 }
];
let tuningState = [0, 0, 0, 0];
let selectedIdx = 2;
let focusedElementId = null; 
let analysisId = 0;

function getNoteString(obj) { return obj.step + ACC_TO_STR[obj.acc] + obj.oct; }

function getAudioSettings() {
    return {
        f1: parseFloat(document.getElementById('f1').value),
        f2: parseFloat(document.getElementById('f2').value),
        f3: parseFloat(document.getElementById('f3').value),
        vibratoJitterCutoff: parseFloat(document.getElementById('vibratoJitterCutoff').value),
        vibratoJitterAmount: parseFloat(document.getElementById('vibratoJitterAmount').value),
        phaseJitter: parseFloat(document.getElementById('phaseJitter').value),
        vibratoDepth: parseFloat(document.getElementById('vibratoDepth').value),
        vibratoRateMean: parseFloat(document.getElementById('vibratoRateMean').value),
        vibratoRateRange: parseFloat(document.getElementById('vibratoRateRange').value),
        q1: parseFloat(document.getElementById('formantQ1').value),
        q2: parseFloat(document.getElementById('formantQ2').value),
        vps: parseInt(document.getElementById('vpsCount').value),
        duration: parseFloat(document.getElementById('duration').value),
        volume: parseFloat(document.getElementById('volume').value)
    };
}

// Logic for Vowel Selection vs Custom Sliders
document.querySelectorAll('input[name="vowel"]').forEach(radio => {
    radio.onchange = () => {
        if (radio.value === 'custom') {
            document.getElementById('advDetails').open = true;
        } else {
            const freqs = VOWEL_PRESETS[radio.value];
            if (freqs) {
                ['f1', 'f2', 'f3'].forEach((id, idx) => {
                    const slider = document.getElementById(id);
                    slider.value = freqs[idx];
                    document.getElementById('v_' + id).innerText = freqs[idx] + "Hz";
                });
            }
        }
    }
});

['f1', 'f2', 'f3'].forEach(id => {
    document.getElementById(id).oninput = (e) => {
        document.getElementById('v_' + id).innerText = e.target.value + "Hz";
        document.querySelector('input[name="vowel"][value="custom"]').checked = true;
    };
});

// Generic slider update for other advanced settings
['vibratoJitterCutoff', 'vibratoJitterAmount', 'vibratoDepth', 'vibratoRateMean', 'vibratoRateRange', 'phaseJitter', 'formantQ1', 'formantQ2'].forEach(id => {
    const el = document.getElementById(id);
    el.oninput = () => { 
        let suffix = "";
        if (id.includes('Rate') || id.includes('Cutoff')) suffix = "Hz";
        else if (id === 'phaseJitter') suffix = "s";
        document.getElementById('v_' + id).innerText = el.value + suffix; 
    };
});

function updateNote(idx, semiChange) {
    const context = chordState.map((s, i) => ({ step: s.step, semi: getAbsSemitone(s), idx: i })).filter(n => n.idx !== idx);
    chordState[idx] = Object.assign({}, chordState[idx], getVariations(getAbsSemitone(chordState[idx]) + semiChange, chordState[idx].oct, context)[0]);
    renderMutation();
}

function manualUpdate(idx, val) {
    const match = val.match(/^([a-gA-G])(bb|b|#|x)?([0-8])$/i);
    if (match) {
        const step = match[1].toLowerCase();
        const acc = STR_TO_ACC[match[2] ? match[2].toLowerCase() : ""];
        const oct = parseInt(match[3]);
        const context = chordState.map((s, i) => ({ step: s.step, semi: getAbsSemitone(s), idx: i })).filter(n => n.idx !== idx);
        chordState[idx] = Object.assign({}, chordState[idx], getVariations((oct * 12) + STEP_TO_SEMI[step] + acc, chordState[idx].oct, context)[0]);
        renderMutation();
    }
}

function cycleEnharmonic(idx) {
    const vars = getVariations(getAbsSemitone(chordState[idx]), chordState[idx].oct, chordState.map((s, i) => ({ step: s.step, semi: getAbsSemitone(s), idx: i })).filter(n => n.idx !== idx));
    let curIdx = vars.findIndex(v => v.step === chordState[idx].step && v.acc === chordState[idx].acc && v.oct === chordState[idx].oct);
    chordState[idx] = Object.assign({}, chordState[idx], vars[(curIdx + 1) % vars.length]);
    renderMutation();
}

async function fetchAnalysis() {
    const currentId = ++analysisId;
    const allowRootless = document.getElementById('rootlessToggle').checked;
    const tuningStyle = document.querySelector('input[name="intonation"]:checked').value;
    
    document.getElementById('analysis-result').classList.add('pending');
    document.getElementById('pendingIndicator').style.display = 'inline';

    try {
        const res = await fetch('/analyze', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ notes: chordState.map(s => getNoteString(s)), allow_rootless: allowRootless, tuning_style: tuningStyle }) 
        });
        const data = await res.json();
        if (currentId === analysisId && !data.error) {
            document.getElementById('chordName').innerText = data.common_name || "Unknown Chord";
            document.getElementById('meta').innerText = (data.inversion + " - " + data.voicing).toUpperCase();
            document.getElementById('roles').innerHTML = (data.notes || []).map(n => "<div>" + n.part + ": <strong>" + n.role + "</strong></div>").join('');
            if (tuningStyle !== 'custom') {
                tuningState = data.notes.map(n => n.tuning);
            }
            renderUI(); 
        }
    } catch (e) { console.error(e); }
    finally {
        if (currentId === analysisId) {
            document.getElementById('analysis-result').classList.remove('pending');
            document.getElementById('pendingIndicator').style.display = 'none';
        }
    }
}

function renderUI() {
    renderControls(document.querySelector('.controls'), chordState, selectedIdx, tuningState, manualUpdate, updateNote, cycleEnharmonic);
    drawChord("notation", chordState);
    if (focusedElementId) {
        const el = document.getElementById(focusedElementId);
        if (el) el.focus();
    }
}

function renderMutation() {
    renderUI();
    fetchAnalysis();
}

window.addEventListener('selectPart', (e) => {
    selectedIdx = e.detail;
    focusedElementId = null;
    renderUI();
});

window.addEventListener('inputFocus', (e) => {
    selectedIdx = e.detail.idx;
    focusedElementId = e.detail.id;
    document.querySelectorAll('.part-ctrl').forEach((c, i) => c.classList.toggle('active', i === selectedIdx));
});

window.addEventListener('tuningUpdate', (e) => {
    const val = parseFloat(e.detail.val);
    tuningState[e.detail.idx] = isNaN(val) ? e.detail.val : val;
    if (e.detail.manual) {
        document.querySelector('input[name="intonation"][value="custom"]').checked = true;
    }
});

document.getElementById('playBtn').onclick = () => playChord(chordState, tuningState, getAudioSettings());
document.getElementById('saveBtn').onclick = () => saveChordAsWav(chordState, tuningState, getAudioSettings());
document.getElementById('analyzeBtn').onclick = async () => {
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    setTimeout(async () => {
        try { await analyzeAndShow(chordState, tuningState, getAudioSettings()); }
        finally { btn.disabled = false; }
    }, 50);
};

document.getElementById('rootlessToggle').onchange = () => fetchAnalysis();
document.querySelectorAll('input[name="intonation"]').forEach(r => r.onchange = () => fetchAnalysis());

window.addEventListener('keydown', (e) => {
    handleGlobalKey(e, 
        { selectedIdx, isTyping: document.activeElement.tagName === 'INPUT' },
        {
            updateNote,
            cycleEnharmonic,
            renderUI,
            playChord: () => document.getElementById('playBtn').click(),
            navigate: (idx) => {
                selectedIdx = idx;
                focusedElementId = null;
                renderUI();
            }
        }
    );
});

renderUI();
fetchAnalysis();
</script>
</body>
</html>
