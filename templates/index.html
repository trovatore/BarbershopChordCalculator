<!DOCTYPE html>
<html>
<head>
    <title>Barbershop Chord Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 40px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 800px; position: relative; }
        #notation-container { background: #fff; border: 1px solid #e1e4e8; margin-bottom: 20px; border-radius: 8px; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 10px; }
        .part-ctrl { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #eee; cursor: pointer; transition: all 0.1s; }
        .part-ctrl.active { border-color: #007bff; background: #e7f3ff; }
        
        .note-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; }
        input.note-input { width: 80px; font-size: 1.1rem; text-align: center; padding: 6px; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; outline: none; }
        .tuning-display { 
            width: 42px; font-size: 0.75rem; color: #666; background: #e9ecef; padding: 6px 2px; border-radius: 6px; 
            min-height: 1.1rem; font-family: monospace; border: 1px solid #dee2e6; display: flex; align-items: center; justify-content: center;
        }

        .btn-group { display: flex; justify-content: center; gap: 4px; }
        button { cursor: pointer; border: 1px solid #ccc; background: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        #analysis-result { border-top: 2px solid #f0f0f0; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; min-height: 80px; transition: opacity 0.2s; }
        #analysis-result.pending { opacity: 0.4; }
        .pending-text { font-size: 0.8rem; font-weight: normal; color: #999; margin-left: 10px; }
        .manifest { position: absolute; top: 10px; right: 15px; font-size: 0.65rem; color: #bbb; font-family: monospace; text-align: right; line-height: 1.4; }
        .manifest a { color: #007bff; text-decoration: none; font-weight: bold; }
        
        .play-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; cursor: pointer; }
        .play-btn:hover { background: #218838; }
        
        .save-btn { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; cursor: pointer; }
        .save-btn:hover { background: #5a6268; }
        
        .analyze-btn { background: #17a2b8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; cursor: pointer; }
        .analyze-btn:hover { background: #138496; }
        .analyze-btn:disabled { opacity: 0.6; cursor: wait; }

        .settings-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 25px; padding: 0 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: #555; }
        
        .vowel-selector { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .vowel-opt { cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 0.85rem; background: #eee; padding: 4px 8px; border-radius: 4px; }
        .vowel-opt input { margin: 0; }
    </style>
</head>
<body>
<div class="card">
    <div id="manifest" class="manifest"></div>
    <h1 style="margin-top:0; font-size: 1.1rem; color: #666;">Barbershop Chord Calculator</h1>
    <div id="notation-container"><div id="notation"></div></div>
    <div class="controls"></div>
    
    <div class="settings-grid">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label class="checkbox-label"><input type="checkbox" id="rootlessToggle"> Analyze half-diminished as rootless 9ths</label>
            <label class="checkbox-label"><input type="checkbox" id="jiAudioToggle" checked> Use Just Intonation in playback</label>
        </div>
        <div class="vowel-selector">
            <span style="font-size: 0.85rem; color: #555; font-weight: bold; width: 100%;">Playback Vowel:</span>
            <label class="vowel-opt"><input type="radio" name="vowel" value="a" checked> [a]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="æ"> [æ]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="ɛ"> [ɛ]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="ʌ"> [ʌ]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="ɔ"> [ɔ]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="e"> [e]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="o"> [o]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="i"> [i]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="ɪ"> [ɪ]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="ʊ"> [ʊ]</label>
            <label class="vowel-opt"><input type="radio" name="vowel" value="u"> [u]</label>
        </div>
    </div>

    <div id="analysis-result">
        <div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <h2 id="chordName" style="margin:0;">Analyzing...</h2>
                <button id="playBtn" class="play-btn"><span>▶</span> Play</button>
                <button id="saveBtn" class="save-btn"><span>💾</span> Save .wav</button>
                <button id="analyzeBtn" class="analyze-btn"><span>📊</span> Analyze</button>
            </div>
            <span id="pendingIndicator" class="pending-text" style="display:none;">(calculating...)</span>
            <p id="meta" style="color: #007bff; font-weight: 600; margin: 5px 0; min-height: 1.2em;"></p>
        </div>
        <div id="roles" style="text-align: right; color: #444; line-height: 1.5;"></div>
    </div>
</div>

<script type="module">
import { getAbsSemitone, getVariations, STR_TO_ACC, ACC_TO_STR, STEP_TO_SEMI, SERIAL as S_SPEL } from '/static/js/spelling.js';
import { renderControls, SERIAL as S_UI } from '/static/js/ui-controls.js';
import { drawChord, SERIAL as S_NOT } from '/static/js/notation.js';
import { playChord, saveChordAsWav, analyzeAndShow, SERIAL as S_AUD } from '/static/js/audio.js';

/**
 * Global Configuration
 */
const SHOW_SERIALS = false;
const S_IDX = "#032";

// Update Manifest UI
const manifestEl = document.getElementById('manifest');
const docsLink = "<a href='/help' target='_blank'>Documentation</a>";
if (SHOW_SERIALS) {
    manifestEl.innerHTML = "index: " + S_IDX + " | " + docsLink + "<br>spel: " + S_SPEL + "<br>ui: " + S_UI + "<br>not: " + S_NOT + "<br>aud: " + S_AUD + "<br>test: #028";
} else {
    manifestEl.innerHTML = docsLink;
}

let chordState = [
    { part: 'Bass', step: 'g', acc: 0, oct: 3 },
    { part: 'Bari', step: 'b', acc: 0, oct: 3 },
    { part: 'Lead', step: 'd', acc: 0, oct: 4 },
    { part: 'Tenor', step: 'f', acc: 0, oct: 4 }
];
let selectedIdx = 2;
let analysisId = 0;
let lastAnalysis = null;

function getNoteString(obj) { return obj.step + ACC_TO_STR[obj.acc] + obj.oct; }

function getSpellingContext(excludeIdx) {
    return chordState
        .map((s, i) => { 
            return { step: s.step, semi: getAbsSemitone(s), idx: i }; 
        })
        .filter(n => n.idx !== excludeIdx);
}

function resolveSpelling(idx, targetSemi) {
    const context = getSpellingContext(idx);
    const variations = getVariations(targetSemi, chordState[idx].oct, context);
    return variations[0];
}

function updateNote(idx, semiChange) {
    let targetSemi = getAbsSemitone(chordState[idx]) + semiChange;
    chordState[idx] = Object.assign({}, chordState[idx], resolveSpelling(idx, targetSemi));
    renderAll();
}

function manualUpdate(idx, val) {
    const match = val.match(/^([a-gA-G])(bb|b|#|x)?([0-8])$/i);
    if (match) {
        const step = match[1].toLowerCase();
        const acc = STR_TO_ACC[match[2] ? match[2].toLowerCase() : ""];
        const oct = parseInt(match[3]);
        const targetSemi = (oct * 12) + STEP_TO_SEMI[step] + acc;
        chordState[idx] = Object.assign({}, chordState[idx], resolveSpelling(idx, targetSemi));
        renderAll();
    }
}

function cycleEnharmonic(idx) {
    const semi = getAbsSemitone(chordState[idx]);
    const context = getSpellingContext(idx);
    const variations = getVariations(semi, chordState[idx].oct, context);
    let curIdx = variations.findIndex(v => {
        return v.step === chordState[idx].step && v.acc === chordState[idx].acc && v.oct === chordState[idx].oct;
    });
    chordState[idx] = Object.assign({}, chordState[idx], variations[(curIdx + 1) % variations.length]);
    renderAll();
}

async function fetchAnalysis() {
    const currentId = ++analysisId;
    const allowRootless = document.getElementById('rootlessToggle').checked;
    
    document.getElementById('analysis-result').classList.add('pending');
    document.getElementById('pendingIndicator').style.display = 'inline';

    try {
        const notes = chordState.map(s => getNoteString(s));
        const res = await fetch('/analyze', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ 
                notes: notes,
                allow_rootless: allowRootless
            }) 
        });
        const data = await res.json();
        
        if (currentId === analysisId) {
            lastAnalysis = data;
            if (data.error) {
                document.getElementById('chordName').innerText = "Analysis Error";
            } else {
                document.getElementById('chordName').innerText = data.common_name || "Unknown Chord";
                const inv = data.inversion || "";
                const voi = data.voicing || "";
                document.getElementById('meta').innerText = inv.toUpperCase() + " - " + voi.toUpperCase();
                document.getElementById('roles').innerHTML = (data.notes || []).map(n => "<div>" + n.part + ": <strong>" + n.role + "</strong></div>").join('');
                
                data.notes.forEach((noteData, i) => {
                    const tuningEl = document.getElementById(`tuning-${i}`);
                    if (tuningEl) {
                        const val = noteData.tuning;
                        tuningEl.innerText = (val > 0 ? "+" : "") + val;
                    }
                });
            }
            document.getElementById('analysis-result').classList.remove('pending');
            document.getElementById('pendingIndicator').style.display = 'none';
        }
    } catch (e) { 
        if (currentId === analysisId) {
            document.getElementById('chordName').innerText = "Connection error..."; 
        }
    }
}

function handlePlayback() {
    const vowel = document.querySelector('input[name="vowel"]:checked').value;
    const useJI = document.getElementById('jiAudioToggle').checked;
    const tunings = (useJI && lastAnalysis) ? lastAnalysis.notes.map(n => n.tuning) : null;
    playChord(chordState, vowel, tunings);
}

function handleSave() {
    const vowel = document.querySelector('input[name="vowel"]:checked').value;
    const useJI = document.getElementById('jiAudioToggle').checked;
    const tunings = (useJI && lastAnalysis) ? lastAnalysis.notes.map(n => n.tuning) : null;
    saveChordAsWav(chordState, vowel, tunings);
}

async function handleAnalysis() {
    const btn = document.getElementById('analyzeBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = "<span>⏳</span> Analyzing...";
    btn.disabled = true;

    // Use a small timeout to allow UI to update before heavy computation
    setTimeout(async () => {
        try {
            const vowel = document.querySelector('input[name="vowel"]:checked').value;
            const useJI = document.getElementById('jiAudioToggle').checked;
            const tunings = (useJI && lastAnalysis) ? lastAnalysis.notes.map(n => n.tuning) : null;
            await analyzeAndShow(chordState, vowel, tunings);
        } catch (e) {
            console.error(e);
            alert("Analysis failed. See console for details.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }, 50);
}

function renderAll() {
    renderControls(document.querySelector('.controls'), chordState, selectedIdx, manualUpdate, updateNote, cycleEnharmonic);
    drawChord("notation", chordState);
    fetchAnalysis();
}

document.getElementById('playBtn').onclick = handlePlayback;
document.getElementById('saveBtn').onclick = handleSave;
document.getElementById('analyzeBtn').onclick = handleAnalysis;
document.getElementById('rootlessToggle').onchange = () => fetchAnalysis();

window.addEventListener('selectPart', (e) => { selectedIdx = e.detail; renderAll(); });

window.addEventListener('keydown', (e) => {
    const isTyping = document.activeElement.tagName === 'INPUT';
    if (isTyping) {
        if (e.key === 'Enter') document.activeElement.blur();
        return;
    }
    if (e.key === 'p') { e.preventDefault(); handlePlayback(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); updateNote(selectedIdx, 1); }
    if (e.key === 'ArrowDown') { e.preventDefault(); updateNote(selectedIdx, -1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); selectedIdx = (selectedIdx + 3) % 4; renderAll(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); selectedIdx = (selectedIdx + 1) % 4; renderAll(); }
    if (e.key === 'Enter') { e.preventDefault(); cycleEnharmonic(selectedIdx); }
    if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey) { selectedIdx = (selectedIdx + 3) % 4; }
        else { selectedIdx = (selectedIdx + 1) % 4; }
        renderAll();
    }
});

renderAll();
</script>
</body>
</html>
