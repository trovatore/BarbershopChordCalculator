<!DOCTYPE html>
<html>
<head>
    <title>JS Unit Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; line-height: 1.5; }
        .pass { color: green; }
        .fail { color: red; font-weight: bold; }
        h1 { border-bottom: 2px solid #eee; }
        .summary { margin-top: 20px; font-weight: bold; border-top: 2px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>Browser Unit Tests - Serial #033</h1>
    <div id="results">Running tests...</div>
    <div id="summary" class="summary"></div>

    <script type="module">
        import { getAbsSemitone, getVariations } from '/static/js/spelling.js';
        import { renderControls } from '/static/js/ui-controls.js';
        import { getNoteInfo, findPeaks, getMagnitudes } from '/static/js/audio.js';

        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        let passCount = 0;
        let failCount = 0;

        function assert(condition, message) {
            const div = document.createElement('div');
            if (condition) {
                div.className = 'pass';
                div.innerText = '✓ ' + message;
                passCount++;
            } else {
                div.className = 'fail';
                div.innerText = '✕ ' + message;
                failCount++;
            }
            results.appendChild(div);
        }

        async function runTests() {
            results.innerHTML = '';

            // --- 1. Basic Semitone Calculations ---
            assert(getAbsSemitone({step: 'c', acc: 0, oct: 4}) === 48, "C4 should be 48");
            
            // --- 2. Accidental Preference ---
            const pref49 = getVariations(49, 4, []);
            assert(pref49[0].step === 'd' && pref49[0].acc === -1, "Prefer Db4 over C#4 in vacuum");

            // --- 3. False Relation Avoidance ---
            const contextFalse = [{step: 'd', semi: 50}];
            const variationsFalse = getVariations(49, 4, contextFalse);
            assert(variationsFalse[0].step === 'c' && variationsFalse[0].acc === 1, "Pick C#4 when D4 is present");

            // --- 4. Global Preference Order ---
            const pref47 = getVariations(47, 3, []);
            assert(pref47[0].step === 'b' && pref47[0].acc === 0, "Preference: Natural B3 preferred over Cb4");

            // --- 5. UI Rendering & Field IDs ---
            const testContainer = document.createElement('div');
            document.body.appendChild(testContainer);
            const mockChord = [
                { part: 'Bass', step: 'g', acc: 0, oct: 3 }, 
                { part: 'Bari', step: 'b', acc: 0, oct: 3 }, 
                { part: 'Lead', step: 'd', acc: 0, oct: 4 }, 
                { part: 'Tenor', step: 'f', acc: 0, oct: 4 }
            ];
            const mockTuning = [0, 0, 0, 0];
            renderControls(testContainer, mockChord, 0, mockTuning, () => {}, () => {}, () => {});
            
            const noteInput0 = testContainer.querySelector('#note-input-0');
            const tuningInput0 = testContainer.querySelector('#tuning-0');
            assert(noteInput0 && tuningInput0, "UI should render predictable IDs for navigation");

            // --- 6. Interaction: Auto-Selection on Focus ---
            noteInput0.focus();
            await new Promise(r => setTimeout(r, 50)); // Wait for selection logic
            assert(noteInput0.selectionStart === 0 && noteInput0.selectionEnd === noteInput0.value.length, 
                   "Focusing a Note input should auto-select text");
            
            tuningInput0.focus();
            await new Promise(r => setTimeout(r, 50));
            assert(tuningInput0.selectionStart === 0 && tuningInput0.selectionEnd === tuningInput0.value.length, 
                   "Focusing a Tuning input should auto-select text");

            // --- 7. Navigation: Voice Switching Visuals ---
            renderControls(testContainer, mockChord, 2, mockTuning, () => {}, () => {}, () => {});
            const leadCard = testContainer.querySelectorAll('.part-ctrl')[2];
            assert(leadCard.classList.contains('active'), "Active class follows index");

            // --- 8. Audio Analysis Accuracy ---
            const a4 = getNoteInfo(440);
            assert(a4.note === "A4" && a4.cents === 0, "440Hz is A4");
            
            const sharpA4 = getNoteInfo(442.5);
            assert(sharpA4.note === "A4" && sharpA4.cents === 10, "442.5Hz is A4 +10c");

            // --- 9. WAV Channel Interleaving Logic ---
            const mockBuffer = {
                length: 2,
                getChannelData: (ch) => new Float32Array([ch + 1, ch + 10])
            };
            const interleaved = new Float32Array(8);
            for (let i = 0; i < 2; i++) {
                for (let ch = 0; ch < 4; ch++) {
                    interleaved[i * 4 + ch] = mockBuffer.getChannelData(ch)[i];
                }
            }
            assert(interleaved[0] === 1 && interleaved[3] === 4 && interleaved[4] === 10, 
                   "WAV interleaving logic is correct");

            document.body.removeChild(testContainer);

            // --- Final Summary ---
            summary.innerText = `Tests: ${passCount + failCount} | Passed: ${passCount} | Failed: ${failCount}`;
            summary.style.color = failCount === 0 ? "green" : "red";
            if (failCount === 0) summary.innerText += " - ALL TESTS PASSED";
        }

        runTests();
    </script>
</body>
</html>
