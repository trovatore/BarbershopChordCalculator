<!DOCTYPE html>
<html>
<head>
    <title>JS Unit Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; line-height: 1.5; }
        .pass { color: green; }
        .fail { color: red; font-weight: bold; }
        h1 { border-bottom: 2px solid #eee; }
        .summary { margin-top: 20px; font-weight: bold; border-top: 2px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>Browser Unit Tests - Serial #028</h1>
    <div id="results">Running tests...</div>
    <div id="summary" class="summary"></div>

    <script type="module">
        import { getAbsSemitone, getVariations } from '/static/js/spelling.js';
        import { renderControls } from '/static/js/ui-controls.js';

        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        let passCount = 0;
        let failCount = 0;

        function assert(condition, message) {
            const div = document.createElement('div');
            if (condition) {
                div.className = 'pass';
                div.innerText = '✓ ' + message;
                passCount++;
            } else {
                div.className = 'fail';
                div.innerText = '✕ ' + message;
                failCount++;
            }
            results.appendChild(div);
        }

        results.innerHTML = '';

        // --- 1. Basic Semitone Calculations ---
        assert(getAbsSemitone({step: 'c', acc: 0, oct: 4}) === 48, "C4 should be 48");
        
        // --- 2. Accidental Preference (No Context) ---
        const pref49 = getVariations(49, 4, []);
        assert(pref49[0].step === 'd' && pref49[0].acc === -1, "Vacuum: Prefer Db4 over C#4");

        // --- 3. False Relation Avoidance ---
        const contextFalse = [{step: 'd', semi: 50}];
        const variationsFalse = getVariations(49, 4, contextFalse);
        assert(variationsFalse[0].step === 'c' && variationsFalse[0].acc === 1, "False Relation: Pick C#4 when D4 is present to avoid clash");

        // --- 4. Unison Check (Not a False Relation) ---
        const contextUnison = [{step: 'd', semi: 50}];
        const variationsUnison = getVariations(50, 4, contextUnison);
        assert(variationsUnison[0].step === 'd' && variationsUnison[0].acc === 0, "Unison: Pick D4 when another D4 is present (not a false relation)");

        // --- 5. Global Preference Order Check ---
        const pref47 = getVariations(47, 3, []);
        assert(pref47[0].step === 'b' && pref47[0].acc === 0, "Preference: Natural B3 preferred over Cb4");

        // --- 6. Tie-break: All candidates are False Relations ---
        const contextAllFalse = [
            {step: 'd', semi: 50}, 
            {step: 'c', semi: 48}, 
            {step: 'b', semi: 47}
        ];
        const variationsAll = getVariations(49, 4, contextAllFalse);
        assert(variationsAll[0].step === 'd' && variationsAll[0].acc === -1, "Tie-break: All are false relations? Pick Flat Db over Sharp C#");

        // --- 7. UI Control Rendering & Tuning Boxes ---
        const testContainer = document.createElement('div');
        const mockChord = [
            { part: 'Bass', step: 'g', acc: 0, oct: 3 },
            { part: 'Bari', step: 'b', acc: 0, oct: 3 },
            { part: 'Lead', step: 'd', acc: 0, oct: 4 },
            { part: 'Tenor', step: 'f', acc: 0, oct: 4 }
        ];
        
        renderControls(testContainer, mockChord, 2, () => {}, () => {}, () => {});
        
        const tuningBoxes = testContainer.querySelectorAll('.tuning-display');
        assert(tuningBoxes.length === 4, "Should render 4 tuning display boxes");
        assert(tuningBoxes[0].id === "tuning-0", "Tuning boxes should have incremental IDs (tuning-0)");
        assert(tuningBoxes[3].id === "tuning-3", "Tuning boxes should have incremental IDs (tuning-3)");
        assert(tuningBoxes[0].innerText === "", "Tuning boxes should be empty on initial render (blanking logic)");

        const noteInputs = testContainer.querySelectorAll('.note-input');
        assert(noteInputs[2].parentElement.parentElement.classList.contains('active'), "Selected index (2) should have 'active' class");

        // --- Final Summary ---
        summary.innerText = `Tests: ${passCount + failCount} | Passed: ${passCount} | Failed: ${failCount}`;
        if (failCount === 0) {
            summary.style.color = "green";
            summary.innerText += " - ALL TESTS PASSED";
        } else {
            summary.style.color = "red";
        }
    </script>
</body>
</html>
